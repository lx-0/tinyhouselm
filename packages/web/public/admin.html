<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>tina — observability</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: #0f0d15;
        color: #e7e5ee;
        font-family: -apple-system, system-ui, Segoe UI, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-size: 13px;
      }
      header {
        padding: 14px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
      }
      header h1 {
        margin: 0;
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #b9b0dc;
      }
      header nav a {
        color: #8888aa;
        text-decoration: none;
        margin-left: 14px;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      header nav a:hover { color: #e7e5ee; }
      #clock {
        font-family: ui-monospace, Menlo, monospace;
        font-size: 11px;
        opacity: 0.7;
      }
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 340px 1fr 360px;
        gap: 1px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      section {
        background: #0f0d15;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      section > h2 {
        margin: 0;
        padding: 10px 14px;
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #8888aa;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .scroll {
        overflow-y: auto;
        padding: 8px 10px;
        flex: 1;
      }
      .conv {
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 8px;
        background: rgba(255, 255, 255, 0.02);
      }
      .conv.live { border-color: rgba(255, 220, 120, 0.35); }
      .conv header {
        padding: 0;
        border: 0;
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        margin-bottom: 6px;
      }
      .conv .participants { color: #e7e5ee; font-weight: 500; }
      .conv .meta { color: #8888aa; font-family: ui-monospace, Menlo, monospace; }
      .turn {
        font-size: 11px;
        line-height: 1.45;
        margin: 2px 0;
        word-break: break-word;
      }
      .turn .name { color: #b9b0dc; font-weight: 500; }
      .graph-wrap { flex: 1; position: relative; }
      .graph-wrap svg { width: 100%; height: 100%; display: block; }
      .graph-wrap .empty {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #55556a;
        font-size: 11px;
        font-family: ui-monospace, Menlo, monospace;
      }
      .agent-card {
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 6px;
        padding: 10px 12px;
        margin-bottom: 8px;
        background: rgba(255, 255, 255, 0.02);
      }
      .agent-card.named {
        border-color: rgba(255, 220, 120, 0.35);
        background: rgba(255, 220, 120, 0.04);
      }
      .agent-card .named-star {
        color: #f5c97a;
        margin-right: 4px;
        font-size: 11px;
      }
      .agent-card .bio {
        font-size: 10px;
        color: #c4b992;
        margin-top: 2px;
        line-height: 1.35;
        font-style: italic;
      }
      .agent-card .row1 {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }
      .agent-card .name {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 500;
      }
      .agent-card .swatch {
        width: 10px;
        height: 10px;
        border-radius: 2px;
      }
      .agent-card .mood {
        font-family: ui-monospace, Menlo, monospace;
        font-size: 10px;
        color: #b9b0dc;
        padding: 2px 6px;
        background: rgba(185, 176, 220, 0.08);
        border-radius: 3px;
      }
      .agent-card .intent {
        font-size: 11px;
        color: #b5b5c5;
        margin: 2px 0;
      }
      .agent-card .meta {
        font-family: ui-monospace, Menlo, monospace;
        font-size: 10px;
        color: #8888aa;
        margin-top: 2px;
      }
      .agent-card .suspend {
        font-size: 10px;
        color: #f0b97a;
        margin-top: 2px;
      }
      .agent-card .recent {
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px dashed rgba(255, 255, 255, 0.06);
        font-family: ui-monospace, Menlo, monospace;
        font-size: 10px;
        color: #6e6e86;
        line-height: 1.4;
      }
      .agent-card .reflections {
        margin-top: 8px;
        padding: 6px 8px;
        border: 1px solid rgba(185, 176, 220, 0.18);
        border-radius: 4px;
        background: rgba(185, 176, 220, 0.05);
      }
      .agent-card .reflections-header {
        font-family: ui-monospace, Menlo, monospace;
        font-size: 9px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #b9b0dc;
        margin-bottom: 4px;
      }
      .agent-card .reflect-bullet {
        font-size: 11px;
        color: #d6d0e6;
        line-height: 1.45;
        margin: 3px 0;
        word-break: break-word;
      }
      .agent-card .reflect-tag {
        display: inline-block;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 9px;
        color: #8888aa;
        margin-right: 6px;
      }
      .filter {
        padding: 6px 10px;
        font-size: 11px;
        display: flex;
        gap: 6px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      .filter input {
        flex: 1;
        background: rgba(255, 255, 255, 0.04);
        color: #e7e5ee;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        padding: 3px 6px;
        font-family: inherit;
        font-size: 11px;
      }
      .filter input:focus { outline: none; border-color: #b9b0dc; }
      .disconnected { color: #e88c8c; }
      .intervene {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .intervene fieldset {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        padding: 8px 10px 10px;
        margin: 0;
      }
      .intervene legend {
        padding: 0 6px;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #b9b0dc;
      }
      .intervene .row {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .intervene input,
      .intervene select,
      .intervene button {
        background: rgba(255, 255, 255, 0.04);
        color: #e7e5ee;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        padding: 4px 6px;
        font-family: inherit;
        font-size: 11px;
      }
      .intervene input { flex: 1; }
      .intervene input:focus,
      .intervene select:focus { outline: none; border-color: #b9b0dc; }
      .intervene button {
        cursor: pointer;
        background: rgba(185, 176, 220, 0.15);
        border-color: rgba(185, 176, 220, 0.35);
        color: #e7e5ee;
      }
      .intervene button:hover { background: rgba(185, 176, 220, 0.28); }
      .intervene button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .intervene .status {
        margin-top: 6px;
        font-size: 10px;
        font-family: ui-monospace, Menlo, monospace;
        color: #8888aa;
        min-height: 1em;
      }
      .intervene .status.ok { color: #8ccfa3; }
      .intervene .status.err { color: #e88c8c; }
      .intervene .objects {
        margin-top: 6px;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 10px;
        color: #b5b5c5;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .intervene .objects .obj {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 2px 4px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.03);
      }
      .intervene .objects .obj button {
        padding: 1px 6px;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>tina — observability</h1>
      <span id="clock">connecting…</span>
      <nav>
        <a href="/">world view</a>
        <a href="/health">health</a>
      </nav>
    </header>
    <main>
      <section>
        <h2>live conversations</h2>
        <div class="filter"><input id="conv-filter" placeholder="filter by name…" /></div>
        <div class="scroll" id="conv-list"></div>
      </section>
      <section>
        <h2>relationship graph</h2>
        <div class="graph-wrap" id="graph-wrap">
          <svg id="graph" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet"></svg>
          <div class="empty" id="graph-empty">no conversations observed yet</div>
        </div>
      </section>
      <section>
        <h2>agents</h2>
        <div class="filter">
          <input id="agent-filter" list="agent-names" placeholder="filter by name… (★ named)" />
        </div>
        <datalist id="agent-names"></datalist>
        <div class="scroll" id="agent-list"></div>
        <div style="padding: 10px 12px; border-top: 1px solid rgba(255,255,255,0.06);">
          <div class="intervene">
            <fieldset>
              <legend>whisper</legend>
              <div class="row">
                <select id="whisper-agent"></select>
              </div>
              <div class="row">
                <input id="whisper-text" placeholder="you hear that Mei is crying…" maxlength="400" />
                <button id="whisper-send" type="button">send</button>
              </div>
              <div class="status" id="whisper-status"></div>
            </fieldset>
            <fieldset>
              <legend>world event</legend>
              <div class="row">
                <input id="event-text" placeholder="a fire starts in the cafe" maxlength="400" />
              </div>
              <div class="row">
                <select id="event-zone"><option value="">(all zones)</option></select>
                <button id="event-send" type="button">inject</button>
              </div>
              <div class="status" id="event-status"></div>
            </fieldset>
            <fieldset>
              <legend>object</legend>
              <div class="row">
                <input id="object-label" placeholder="old letter" maxlength="120" />
                <select id="object-zone"><option value="">(anywhere)</option></select>
                <button id="object-drop" type="button">drop</button>
              </div>
              <div class="status" id="object-status"></div>
              <div class="objects" id="object-list"></div>
            </fieldset>
            <fieldset>
              <legend>snapshot</legend>
              <div class="status" id="snapshot-status">—</div>
              <div class="row">
                <button id="snapshot-save" type="button">save now</button>
              </div>
              <div class="status" id="snapshot-action-status"></div>
            </fieldset>
            <input id="admin-token" placeholder="x-admin-token (optional)" style="background: rgba(255,255,255,0.04); color: #e7e5ee; border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; padding: 4px 6px; font-family: inherit; font-size: 11px;" />
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/admin.js"></script>
  </body>
</html>
